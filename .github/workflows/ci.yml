# CI-гейт (правило №1 CLAUDE.md: ничего не мержится с красным CI).
# Бэкенд: типы + юнит-тесты + coverage-храповик. Фронтенды: сборка (ловит
# TS-ошибки). eslint — храповиком (правило №9): исторический долг
# зафиксирован в scripts/eslint-baseline.json, рост счётчика роняет джобу
# eslint. Покрытие бэкенда — храповиком в scripts/coverage-baseline.json
# (TEST_COVERAGE_PLAN.md, этап 4, п.14).
name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Ручной запуск на любой ветке: пуши агента через интеграцию не триггерят
  # pull_request-раны, а правило 1а требует зелёный CI перед мержем — агент
  # запускает воркфлоу сам (gh/API workflow_dispatch) и ждёт результата.
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit -p tsconfig.build.json
      # coverage-храповик (TEST_COVERAGE_PLAN.md, этап 4, п.14): сам гоняет
      # jest --coverage, отдельный `npx jest` не нужен. Падает при просадке
      # покрытия ниже scripts/coverage-baseline.json (общей или по полу
      # src/auth и src/utils).
      - run: node scripts/check-coverage-ratchet.mjs
      # Тот же пакет тестов под НЕ-UTC зоной (инцидент 2026-07-20).
      # Раннер всегда UTC, поэтому баги «время считается от зоны сервера»
      # в CI невидимы: парсер TZID в caldav-busy.ts был сломан для любой
      # не-UTC машины, но CI был зелёный, а разработчик в Asia/Jerusalem
      # ловил два красных теста и искал причину в своём окружении.
      # Sydney выбран намеренно: ненулевое смещение + DST в противофазе к
      # северному полушарию. Мутировать process.env.TZ внутри jest нельзя —
      # песочница не пробрасывает смену зоны в V8, только env процесса.
      # Прогон стоит ~20 секунд.
      - name: jest под не-UTC таймзоной — ловит зависимость от зоны сервера
        run: npx jest
        env:
          TZ: Australia/Sydney
      # e2e-смоук (TEST_COVERAGE_PLAN.md, этап 1 п.7): реальный AppModule
      # целиком (ValidationPipe, гарды, фильтры), только PrismaService и
      # TELEGRAF_BOT подменены фейками — ловит то, что юнит-тесты не могут:
      # гард не примонтирован, DTO-пайп не применён глобально, утечку чужих
      # данных через HTTP. См. test/app-auth.e2e-spec.ts, test/app-ownership.e2e-spec.ts.
      # read-after-write.e2e-spec гоняется отдельно в джобе migrations (нужен
      # реальный Postgres) — здесь исключён, наши специи на фейк-Prisma.
      - run: >-
          npx jest --config ./test/jest-e2e.json
          test/app-auth test/app-ownership test/app-ownership-sweep
          test/auth-flows
      # Security-гейт (этап 1.4): high/critical уязвимости в prod-зависимостях
      # блокируют мерж. dev-зависимости не гейтим — шум.
      - run: npm audit --omit=dev --audit-level=high
      # Один маршрут — один контроллер (аудит: найдены живые дубли маршрутов
      # с разъехавшейся privacy-логикой).
      - run: node scripts/check-route-collisions.mjs
      # Храповик копипасты: новая дублированная логика ≥70 токенов не проходит.
      - run: node scripts/check-jscpd-ratchet.mjs
      # Старое имя продукта «СхемаЛаб»/«Схема-лаб» не возвращается (переехали на
      # «Всё по схеме»); первый проход искал только латиницей и кириллицу упустил.
      - run: node scripts/check-legacy-name.mjs
      # Храповик размера файлов (правило №10): файл из бейслайна только
      # уменьшается, новый файл >300 строк не проходит. Долг тает, не растёт.
      - run: node scripts/check-file-size-ratchet.mjs

  # Миграции гоняются на РЕАЛЬНОМ Postgres (инцидент 2026-07-16: битый сид
  # healthy_adult_phrases — updatedAt NOT NULL без значения — уронил прод
  # в крашлуп; ни один существующий чек SQL не исполнял). Правило CLAUDE.md
  # «Миграции БД»: рукописный SQL не мержится, пока не прошёл migrate deploy.
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: migrate deploy на пустой БД — ловит битые миграции до прода
        run: npx prisma migrate deploy
      - name: повторный migrate deploy — все миграции зарегистрированы, состояние чистое
        run: npx prisma migrate deploy
      # Джоба проверяла только что SQL исполняется, но не что миграции дают ту
      # же БД, что объявлена в schema.prisma. Из-за этого дрейф копился
      # незаметно: 4 индекса были в схеме, но их не создавала ни одна миграция —
      # на проде их просто не было, запросы шли последовательным сканом.
      # --exit-code: 0 = дифф пуст, 2 = есть расхождение → джоба падает.
      - name: schema.prisma == миграции — дрейф роняет PR, а не копится годами
        run: npx prisma migrate diff --from-config-datasource --to-schema prisma/schema.prisma --exit-code
      - run: npx prisma generate
      # E2E read-after-write smoke на реальном Postgres (best-practice 2026-07):
      # сохранил карточку → читается обратно + попала в денормализованный
      # профиль. Только этот спек (app.e2e-spec поднимает весь AppModule и
      # требует полного env — здесь не нужен). --runInBand: одна БД, без гонок.
      - name: e2e read-after-write smoke
        run: npx jest --config ./test/jest-e2e.json --runInBand test/read-after-write.e2e-spec.ts

  webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - run: npm ci --prefix webapp
      - run: npm run build --prefix webapp
      - run: npm test --prefix webapp
      # ты/вы-храповик (правило CLAUDE.md): новые жёсткие «ты»-строки без tr()
      # не проходят; исторический долг зафиксирован в бейслайне.
      - run: node scripts/check-address-form.mjs
      # Драйв-гард парных файлов (правило №3): канонические пары
      # webapp ↔ miniapp обязаны быть побайтово идентичны.
      - run: node scripts/check-paired-files.mjs

  # eslint-храповик (этап 2е, правило №9). Нужны node_modules всех трёх
  # пакетов + prisma generate: typed-линт без типов зависимостей видит
  # everything-as-any и счётчики уезжают. game/ исключён (заморожен).
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webapp/package-lock.json
            schema-miniapp/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm ci --prefix webapp
      - run: npm ci --prefix schema-miniapp
      - run: node scripts/check-eslint-ratchet.mjs

  miniapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: schema-miniapp/package-lock.json
      - run: npm ci --prefix schema-miniapp
      # build мини-аппа — голый `vite build` (без tsc, чтобы пересборка dist
      # оставалась быстрой). Типы гоняем отдельным шагом через
      # tsconfig.typecheck.json — иначе TS-ошибки в исходнике мини-аппа
      # доезжают до прода (webapp имеет гейт через `tsc -b`).
      - run: npm run typecheck --prefix schema-miniapp
      - run: npm run build --prefix schema-miniapp
      - run: npm test --prefix schema-miniapp
      # dist коммитится в git (Docker его только копирует) — проверяем,
      # что закоммиченный dist не разошёлся с исходником.
      - name: dist актуален
        run: |
          if [ -n "$(git status --porcelain schema-miniapp/dist)" ]; then
            echo '::error::schema-miniapp/dist устарел — пересобери: npm run build --prefix schema-miniapp и закоммить dist'
            git status --short schema-miniapp/dist
            exit 1
          fi
