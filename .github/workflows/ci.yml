# CI-гейт (правило №1 CLAUDE.md: ничего не мержится с красным CI).
# Бэкенд: типы + юнит-тесты. Фронтенды: сборка (ловит TS-ошибки).
# eslint — храповиком (правило №9): исторический долг зафиксирован
# в scripts/eslint-baseline.json, рост счётчика роняет джобу eslint.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit -p tsconfig.build.json
      - run: npx jest --silent
      # Security-гейт (этап 1.4): high/critical уязвимости в prod-зависимостях
      # блокируют мерж. dev-зависимости не гейтим — шум.
      - run: npm audit --omit=dev --audit-level=high
      # Один маршрут — один контроллер (аудит: найдены живые дубли маршрутов
      # с разъехавшейся privacy-логикой).
      - run: node scripts/check-route-collisions.mjs
      # Храповик копипасты: новая дублированная логика ≥70 токенов не проходит.
      - run: node scripts/check-jscpd-ratchet.mjs

  webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - run: npm ci --prefix webapp
      - run: npm run build --prefix webapp
      - run: npm test --prefix webapp
      # ты/вы-храповик (правило CLAUDE.md): новые жёсткие «ты»-строки без tr()
      # не проходят; исторический долг зафиксирован в бейслайне.
      - run: node scripts/check-address-form.mjs
      # Драйв-гард парных файлов (правило №3): канонические пары
      # webapp ↔ miniapp обязаны быть побайтово идентичны.
      - run: node scripts/check-paired-files.mjs

  # eslint-храповик (этап 2е, правило №9). Нужны node_modules всех трёх
  # пакетов + prisma generate: typed-линт без типов зависимостей видит
  # everything-as-any и счётчики уезжают. game/ исключён (заморожен).
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webapp/package-lock.json
            schema-miniapp/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm ci --prefix webapp
      - run: npm ci --prefix schema-miniapp
      - run: node scripts/check-eslint-ratchet.mjs

  miniapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: schema-miniapp/package-lock.json
      - run: npm ci --prefix schema-miniapp
      - run: npm run build --prefix schema-miniapp
      # dist коммитится в git (Docker его только копирует) — проверяем,
      # что закоммиченный dist не разошёлся с исходником.
      - name: dist актуален
        run: |
          if [ -n "$(git status --porcelain schema-miniapp/dist)" ]; then
            echo '::error::schema-miniapp/dist устарел — пересобери: npm run build --prefix schema-miniapp и закоммить dist'
            git status --short schema-miniapp/dist
            exit 1
          fi
