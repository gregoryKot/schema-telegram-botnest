<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <!-- Страница сама перепроверит доступность приложения каждые 30 секунд. -->
  <meta http-equiv="refresh" content="30" />
  <title>Всё по схеме — технические работы</title>
  <style>
    :root {
      --bg1: #f6f4ff; --bg2: #eef4ff; --card: #ffffff; --ink: #1e1b2e;
      --sub: #6b6880; --line: rgba(30, 27, 46, 0.08); --accent: #7c6cf0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg1: #14131c; --bg2: #171a26; --card: #1e1d29; --ink: #ececf4;
        --sub: #9c99b3; --line: rgba(255, 255, 255, 0.09); --accent: #9d8cff;
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, var(--bg2), var(--bg1));
      color: var(--ink); display: flex; align-items: center; justify-content: center;
      padding: 24px; line-height: 1.55; -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 22px;
      max-width: 460px; width: 100%; padding: 40px 34px; text-align: center;
      box-shadow: 0 24px 60px -30px rgba(60, 50, 120, 0.35);
    }
    .emoji { font-size: 46px; line-height: 1; margin-bottom: 18px; }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 12px; }
    p { font-size: 15.5px; color: var(--sub); margin: 0 0 10px; }
    .hint { font-size: 13px; color: var(--sub); opacity: 0.8; margin-top: 22px; }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); margin-right: 7px; vertical-align: middle;
      animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <main class="card">
    <div class="emoji">🛠️</div>
    <h1>Небольшие технические работы</h1>
    <p>Приложение скоро снова будет доступно. Данные на месте — ничего не потеряется.</p>
    <p>Можно закрыть вкладку и заглянуть через пару минут.</p>
    <div class="hint"><span class="dot"></span>Страница обновится сама</div>
  </main>
</body>
</html>
